<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notluk giriş kodu</title>
  </head>
  <body style="margin:0;padding:0;background:#f3f3f3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#242424;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f3f3f3;margin:0;padding:48px 20px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;margin:0 auto;padding:0;">
            <tr>
              <td style="padding:42px 42px 24px;">
                <table role="presentation" cellspacing="0" cellpadding="0">
                  <tr>
                    <td style="font-size:30px;line-height:36px;font-weight:800;color:#171717;letter-spacing:0;">
                      Notluk
                    </td>
                    <td style="padding-left:8px;vertical-align:middle;">
                      <span style="display:inline-block;width:17px;height:15px;background:#ffc400;vertical-align:middle;"></span>
                      <span style="display:block;width:0;height:0;margin-left:2px;border-left:7px solid transparent;border-right:7px solid transparent;border-top:8px solid #222222;"></span>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:0 42px;">
                <p style="margin:0 0 22px;font-size:15px;line-height:24px;color:#242424;">Merhaba,</p>
                <p style="margin:0 0 32px;font-size:15px;line-height:24px;color:#242424;">
                  Notluk'a giriş yapmak için aşağıdaki kodu kullanabilirsin.
                </p>
                <div style="background:#f4f4f4;border-radius:6px;padding:22px 20px;text-align:center;">
                  <span style="font-size:28px;line-height:36px;font-weight:800;letter-spacing:4px;color:#1f1f1f;">{{ .Token }}</span>
                </div>
                <p style="margin:28px 0 0;font-size:13px;line-height:20px;color:#555555;">
                  Bu kodu sen istemediysen bu e-postayı güvenle yok sayabilirsin.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:54px 42px 30px;">
                <p style="margin:0;font-size:12px;line-height:18px;color:#666666;">
                  Bu e-posta, Notluk hesabına giriş kodu istediğin için gönderildi.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
