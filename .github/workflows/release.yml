name: Build DMG release
# Notluk release workflow.

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/release.yml'
      - 'build/**'
      - 'electron/**'
      - 'index.html'
      - 'package-lock.json'
      - 'package.json'
      - 'src/**'
      - 'tsconfig*.json'
      - 'vite.config.ts'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish macOS DMG
    runs-on: macos-15-intel
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_AUTH_REDIRECT_URL: notluk://auth/callback

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate Supabase build config
        run: |
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY"

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag=$(gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 100 \
            --json tagName \
            --jq '[.[].tagName | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))][0] // ""')

          if [ -z "$latest_tag" ]; then
            next_tag="v1.0.0"
          else
            version="${latest_tag#v}"
            IFS=. read -r major minor patch <<< "$version"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "TAG_NAME=$next_tag" >> "$GITHUB_ENV"

      - name: Set release version
        run: npm version "${TAG_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Run tests
        run: npm test

      - name: Build DMG files
        run: npm run build:mac

      - name: Add stable DMG names
        run: |
          cp "release/Notluk-${TAG_NAME#v}-arm64.dmg" release/Notluk-arm64.dmg
          cp "release/Notluk-${TAG_NAME#v}-x64.dmg" release/Notluk-x64.dmg

      - name: Copy README images
        run: |
          curl -fsSL -o release/notluk.png \
            "https://github.com/$GITHUB_REPOSITORY/releases/latest/download/notluk.png"
          curl -fsSL -o release/notluk-dark.png \
            "https://github.com/$GITHUB_REPOSITORY/releases/latest/download/notluk-dark.png"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG_NAME" release/*.dmg release/notluk.png release/notluk-dark.png \
            --repo "$GITHUB_REPOSITORY" \
            --title "Notluk $TAG_NAME" \
            --notes "GitHub Actions tarafindan otomatik olusturuldu." \
            --latest
