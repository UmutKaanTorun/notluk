name: Build DMG release

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/release.yml'
      - 'build/**'
      - 'electron/**'
      - 'index.html'
      - 'package-lock.json'
      - 'package.json'
      - 'src/**'
      - 'tsconfig*.json'
      - 'vite.config.ts'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish macOS DMG
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build DMG files
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: v0.1.${{ github.run_number }}
        run: |
          gh release create "$TAG_NAME" release/*.dmg \
            --repo "$GITHUB_REPOSITORY" \
            --title "Notluk $TAG_NAME" \
            --notes "GitHub Actions tarafindan otomatik olusturuldu." \
            --latest
