name: Build DMG release
# Notluk release workflow.

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/release.yml'
      - 'build/**'
      - 'electron/**'
      - 'index.html'
      - 'package-lock.json'
      - 'package.json'
      - 'src/**'
      - 'tsconfig*.json'
      - 'vite.config.ts'
  workflow_dispatch:

permissions:
  contents: write

env:
  TAG_NAME: v0.1.${{ github.run_number }}

jobs:
  release:
    name: Build and publish macOS DMG
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set release version
        run: npm version "${TAG_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Run tests
        run: npm test

      - name: Build DMG files
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Copy README images
        run: |
          curl -fsSL -o release/notluk.png \
            "https://github.com/$GITHUB_REPOSITORY/releases/latest/download/notluk.png"
          curl -fsSL -o release/notluk-dark.png \
            "https://github.com/$GITHUB_REPOSITORY/releases/latest/download/notluk-dark.png"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG_NAME" release/*.dmg release/notluk.png release/notluk-dark.png \
            --repo "$GITHUB_REPOSITORY" \
            --title "Notluk $TAG_NAME" \
            --notes "GitHub Actions tarafindan otomatik olusturuldu." \
            --latest
